name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: |
          pyinstaller --noconfirm --onedir --windowed --name GPUSeedcracker --icon "assets/icon.png" --hidden-import script --add-data "assets/Gpu-Assisted-Seedcracker-2-23-2026.png;." ui_app.py

      - name: Zip artifact
        run: |
          powershell -Command "Compress-Archive -Path 'dist\GPUSeedcracker\*' -DestinationPath 'GPUSeedcracker-win64.zip' -Force"

      - uses: actions/upload-artifact@v4
        with:
          name: GPUSeedcracker-win64
          path: GPUSeedcracker-win64.zip


